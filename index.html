<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynix Eats | Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #f4f7f6;
            --sidebar: #ffffff;
            --text: #1d1d1f;
            --accent: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --border: #e5e5e7;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
        }

        .logo { font-weight: 800; font-size: 1.5rem; margin-bottom: 40px; color: var(--text); }
        .logo span { color: var(--accent); }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #6e6e73;
        }

        .nav-item:hover { background: #f0f0f5; color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; }

        /* Main Content */
        .main-panel {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-card h3 { font-size: 0.8rem; text-transform: uppercase; color: #8e8e93; margin-bottom: 8px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; }

        /* Table Section */
        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; background: #fafafa; color: #8e8e93; font-size: 0.85rem; }
        td { padding: 16px; border-top: 1px solid var(--border); font-size: 0.9rem; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-pending { background: #fff9e6; color: #d4a017; }
        .badge-active { background: #eafff1; color: var(--success); }

        /* Buttons */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .btn-approve { background: var(--success); color: white; margin-right: 5px; }
        .btn-approve:hover { filter: brightness(1.1); }
        .btn-delete { background: var(--danger); color: white; }
        .btn-delete:hover { opacity: 0.8; }

        /* Modal */
        #editModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">VYNIX<span>ADMIN</span></div>
        <div class="nav-item active">📊 Dashboard</div>
        <div class="nav-item">🏬 Vendors</div>
        <div class="nav-item">📂 Categories</div>
        <div class="nav-item">⚙️ Settings</div>
    </div>

    <div class="main-panel">
        <div class="header">
            <h1>Vendor Management</h1>
            <div id="adminTime" style="color: var(--dim)">System Live</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Vendors</h3>
                <p id="count-total">0</p>
            </div>
            <div class="stat-card">
                <h3>Active</h3>
                <p id="count-active" style="color: var(--success)">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending Approval</h3>
                <p id="count-pending" style="color: #f5a623">0</p>
            </div>
        </div>

        <div class="content-card">
            <div class="card-header">
                <h2 style="font-size: 1.2rem">Business Registry</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Business Name</th>
                        <th>Cuisine</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="vendorTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <h3>Edit Vendor</h3>
            <input type="hidden" id="editKey">
            <input type="text" id="editName" placeholder="Business Name">
            <input type="text" id="editCuisine" placeholder="Cuisine Type">
            <div style="display:flex; gap: 10px; margin-top: 20px">
                <button class="btn btn-approve" onclick="saveEdit()">Save Changes</button>
                <button class="btn btn-delete" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
            authDomain: "pinotp-d7ef5.firebaseapp.com",
            databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
            projectId: "pinotp-d7ef5",
            storageBucket: "pinotp-d7ef5.firebasestorage.app",
            messagingSenderId: "708458917827",
            appId: "1:708458917827:web:375de278577df0adcf9776"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Fetch and Listen to Vendors
        function loadVendors() {
            db.ref('vendors').on('value', (snapshot) => {
                const data = snapshot.val();
                const tableBody = document.getElementById('vendorTableBody');
                tableBody.innerHTML = '';
                
                let total = 0, active = 0, pending = 0;

                for (let key in data) {
                    const vendor = data[key];
                    total++;
                    vendor.status === 'active' ? active++ : pending++;

                    const row = `
                        <tr>
                            <td><strong>#${vendor.vendorID || '----'}</strong></td>
                            <td>${vendor.name}</td>
                            <td>${vendor.cuisine}</td>
                            <td><span class="badge ${vendor.status === 'active' ? 'badge-active' : 'badge-pending'}">${vendor.status.toUpperCase()}</span></td>
                            <td>
                                ${vendor.status === 'pending' ? `<button class="btn btn-approve" onclick="approveVendor('${key}')">Approve</button>` : ''}
                                <button class="btn" style="background: #eee" onclick="openEditModal('${key}', '${vendor.name}', '${vendor.cuisine}')">Edit</button>
                                <button class="btn btn-delete" onclick="deleteVendor('${key}')">Delete</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }

                document.getElementById('count-total').innerText = total;
                document.getElementById('count-active').innerText = active;
                document.getElementById('count-pending').innerText = pending;
            });
        }

        // Action: Approve Vendor
        function approveVendor(key) {
            const randomID = Math.floor(1000 + Math.random() * 9000); // Generate 4-digit ID
            db.ref('vendors/' + key).update({
                status: 'active',
                vendorID: randomID
            }).then(() => alert("Vendor Approved & ID Assigned!"));
        }

        // Action: Delete Vendor
        function deleteVendor(key) {
            if(confirm("Are you sure? This vendor will be removed from the user app instantly.")) {
                db.ref('vendors/' + key).remove();
            }
        }

        // Edit Functions
        function openEditModal(key, name, cuisine) {
            document.getElementById('editKey').value = key;
            document.getElementById('editName').value = name;
            document.getElementById('editCuisine').value = cuisine;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveEdit() {
            const key = document.getElementById('editKey').value;
            const name = document.getElementById('editName').value;
            const cuisine = document.getElementById('editCuisine').value;

            db.ref('vendors/' + key).update({
                name: name,
                cuisine: cuisine
            }).then(() => {
                closeModal();
                alert("Updated successfully!");
            });
        }

        // Initial Load
        loadVendors();
    </script>
</body>
</html>
