<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynix Eats | Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #f4f7f6;
            --sidebar: #ffffff;
            --text: #1d1d1f;
            --accent: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --border: #e5e5e7;
            --dim: #8e8e93;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.5rem; margin-bottom: 40px; color: var(--text); letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .nav-item {
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--dim);
        }

        .nav-item:hover { background: #f0f0f5; color: var(--text); }
        .nav-item.active { background: var(--text); color: white; }

        /* Main Content */
        .main-panel { margin-left: 260px; flex: 1; padding: 40px; }
        .page-content { display: none; animation: fadeIn 0.3s ease-out; }
        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: white; padding: 24px; border-radius: 18px; 
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .stat-card h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--dim); letter-spacing: 0.5px; margin-bottom: 10px; }
        .stat-card p { font-size: 2rem; font-weight: 800; }

        /* Table Design */
        .content-card { background: white; border-radius: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .search-bar { padding: 10px 16px; border: 1px solid var(--border); border-radius: 10px; width: 300px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border 0.2s; }
        .search-bar:focus { border-color: var(--accent); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px 24px; background: #fafafa; color: var(--dim); font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
        td { padding: 18px 24px; border-top: 1px solid var(--border); font-size: 0.95rem; }

        .badge { padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.3px; }
        .badge-pending { background: #fff5cc; color: #997300; }
        .badge-active { background: #e6f9ed; color: var(--success); }

        /* Action Buttons */
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: all 0.2s; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        
        .btn-approve { background: var(--success); color: white; }
        .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
        
        .btn-edit { background: #f2f2f7; color: var(--text); }
        .btn-edit:hover { background: #e5e5ea; }
        
        .btn-delete { background: #fff1f0; color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Modal Customization */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 32px; border-radius: 24px; width: 440px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-content h3 { margin-bottom: 24px; font-size: 1.4rem; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--dim); }
        .modal-content input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; }

        /* Logs Tab */
        .log-item { padding: 12px 24px; border-bottom: 1px solid var(--border); font-size: 0.85rem; display: flex; justify-content: space-between; }
        .log-item:last-child { border: none; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">VYNIX<span>ADMIN</span></div>
        <div class="nav-item active" onclick="showTab('dashboard', this)">📊 Dashboard</div>
        <div class="nav-item" onclick="showTab('vendors', this)">🏬 Vendor List</div>
        <div class="nav-item" onclick="showTab('logs', this)">📜 System Logs</div>
    </nav>

    <main class="main-panel">
        
        <section id="dashboard" class="page-content active">
            <div class="header">
                <h1>Executive Summary</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Partnerships</h3>
                    <p id="stat-total">0</p>
                </div>
                <div class="stat-card">
                    <h3>Approved Vendors</h3>
                    <p id="stat-active" style="color: var(--success)">0</p>
                </div>
                <div class="stat-card">
                    <h3>Awaiting Review</h3>
                    <p id="stat-pending" style="color: #f5a623">0</p>
                </div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <h2 style="font-size: 1.1rem; font-weight: 700;">Live Connection Status</h2>
                </div>
                <div style="padding: 24px; display: flex; align-items: center; gap: 10px;">
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success)"></div>
                    <span style="font-weight: 600;">Firebase Realtime Database: Connected</span>
                </div>
            </div>
        </section>

        <section id="vendors" class="page-content">
            <div class="header">
                <h1>Business Control</h1>
                <input type="text" class="search-bar" id="vendorSearch" placeholder="Search name or 4-digit ID..." onkeyup="filterVendors()">
            </div>

            <div class="content-card">
                <table>
                    <thead>
                        <tr>
                            <th>Unique ID</th>
                            <th>Business Name</th>
                            <th>Cuisine</th>
                            <th>Status</th>
                            <th>Management</th>
                        </tr>
                    </thead>
                    <tbody id="vendorTableBody">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="logs" class="page-content">
            <div class="header">
                <h1>Activity Logs</h1>
            </div>
            <div class="content-card" id="logContainer">
                </div>
        </section>

    </main>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3>Update Business</h3>
            <input type="hidden" id="editKey">
            
            <div class="form-group">
                <label>Business Display Name</label>
                <input type="text" id="editName" placeholder="e.g. Pizza Palace">
            </div>

            <div class="form-group">
                <label>Primary Cuisine Type</label>
                <input type="text" id="editCuisine" placeholder="e.g. Italian, Fast Food">
            </div>

            <div style="display:flex; gap: 12px; margin-top: 10px">
                <button class="btn btn-approve" style="flex:2; justify-content: center;" onclick="saveChanges()">Save Details</button>
                <button class="btn btn-edit" style="flex:1; justify-content: center;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
            authDomain: "pinotp-d7ef5.firebaseapp.com",
            databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
            projectId: "pinotp-d7ef5",
            storageBucket: "pinotp-d7ef5.firebasestorage.app",
            messagingSenderId: "708458917827",
            appId: "1:708458917827:web:375de278577df0adcf9776"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // TAB NAVIGATION
        function showTab(id, element) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            element.classList.add('active');
        }

        // DATABASE LISTENER
        function startSync() {
            db.ref('vendors').on('value', (snapshot) => {
                const data = snapshot.val();
                const table = document.getElementById('vendorTableBody');
                table.innerHTML = '';
                
                let count = { all: 0, active: 0, pending: 0 };

                if (!data) {
                    table.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--dim)">No vendors registered in database.</td></tr>';
                } else {
                    Object.keys(data).forEach(key => {
                        const v = data[key];
                        count.all++;
                        v.status === 'active' ? count.active++ : count.pending++;

                        const row = `
                            <tr data-search="${v.name.toLowerCase()} ${v.vendorID || ''}">
                                <td><code style="font-weight:700; color:var(--accent)">#${v.vendorID || '----'}</code></td>
                                <td style="font-weight:700">${v.name}</td>
                                <td>${v.cuisine}</td>
                                <td><span class="badge ${v.status === 'active' ? 'badge-active' : 'badge-pending'}">${v.status.toUpperCase()}</span></td>
                                <td>
                                    <div class="btn-group">
                                        ${v.status === 'pending' ? `<button class="btn btn-approve" onclick="approveVendor('${key}', '${v.name}')">Approve</button>` : ''}
                                        <button class="btn btn-edit" onclick="openEdit('${key}', '${v.name}', '${v.cuisine}')">Edit</button>
                                        <button class="btn btn-delete" onclick="deleteVendor('${key}', '${v.name}')">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        table.innerHTML += row;
                    });
                }

                document.getElementById('stat-total').innerText = count.all;
                document.getElementById('stat-active').innerText = count.active;
                document.getElementById('stat-pending').innerText = count.pending;
            });
        }

        // ACTIONS
        function approveVendor(key, name) {
            const newID = Math.floor(1000 + Math.random() * 9000);
            db.ref('vendors/' + key).update({
                status: 'active',
                vendorID: newID
            }).then(() => logAction(`Approved: ${name} (Assigned ID: #${newID})`));
        }

        function deleteVendor(key, name) {
            if (confirm(`Are you sure you want to delete "${name}"? This cannot be undone.`)) {
                db.ref('vendors/' + key).remove().then(() => logAction(`Deleted: ${name}`));
            }
        }

        function openEdit(key, name, cuisine) {
            document.getElementById('editKey').value = key;
            document.getElementById('editName').value = name;
            document.getElementById('editCuisine').value = cuisine;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveChanges() {
            const key = document.getElementById('editKey').value;
            const updates = {
                name: document.getElementById('editName').value,
                cuisine: document.getElementById('editCuisine').value
            };
            db.ref('vendors/' + key).update(updates).then(() => {
                logAction(`Updated: ${updates.name}`);
                closeModal();
            });
        }

        // UTILITIES
        function filterVendors() {
            const val = document.getElementById('vendorSearch').value.toLowerCase();
            document.querySelectorAll('#vendorTableBody tr').forEach(row => {
                row.style.display = row.getAttribute('data-search').includes(val) ? '' : 'none';
            });
        }

        function logAction(msg) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const item = `<div class="log-item"><span>${msg}</span><span style="color:var(--dim)">${time}</span></div>`;
            container.innerHTML = item + container.innerHTML;
        }

        // INIT
        startSync();
    </script>
</body>
</html>
